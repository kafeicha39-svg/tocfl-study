<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d7b74">
  <meta name="description" content="TOCFL Band Bの単語を中文・ピンイン・日本語訳・使い方メモつきで学べる例文集です。">
  <title>例文集 | TOCFL Band B Study</title>
  <link rel="stylesheet" href="../assets/css/style.css?v=20260720-4">
</head>
<body class="examples-page" data-translation="visible" data-example-size="normal">
<nav class="lesson-nav" aria-label="例文集ナビゲーション">
  <div class="container">
    <a class="back-link" href="../index.html">← ホーム</a>
    <strong>例文集</strong>
    <span class="back-link" aria-current="page">Day 1〜31</span>
  </div>
</nav>

<header class="hero examples-hero">
  <div class="container">
    <span class="badge">EXAMPLE LIBRARY・TOCFL BAND B</span>
    <h1>例文集</h1>
    <p>単語が実際に使われる場面を、中文・ピンイン・日本語訳でつかみましょう。</p>
  </div>
</header>

<main class="container">
  <section class="card examples-toolbar" aria-labelledby="exampleToolsTitle">
    <div class="section-head examples-toolbar-heading">
      <div>
        <span class="eyebrow">FIND &amp; READ</span>
        <h2 id="exampleToolsTitle">読みたい例文を探す</h2>
      </div>
      <span class="status" id="resultCount" aria-live="polite">読み込み中</span>
    </div>

    <div class="examples-controls">
      <label class="control-field">
        <span>Day</span>
        <select id="dayFilter" aria-label="Dayで絞り込む"></select>
      </label>

      <label class="control-field search-field">
        <span>検索</span>
        <input id="exampleSearch" type="search" placeholder="単語・意味・例文を検索" autocomplete="off">
      </label>

      <div class="control-field">
        <span>日本語訳</span>
        <button class="secondary-button translation-toggle" id="translationToggle" type="button" aria-pressed="true">日本語訳を隠す</button>
      </div>

      <fieldset class="control-field size-control">
        <legend>文字サイズ</legend>
        <div class="size-buttons" aria-label="例文の文字サイズ">
          <button class="size-button active" type="button" data-size="normal" aria-pressed="true">普通</button>
          <button class="size-button" type="button" data-size="large" aria-pressed="false">大</button>
          <button class="size-button" type="button" data-size="xlarge" aria-pressed="false">特大</button>
        </div>
      </fieldset>
    </div>
  </section>

  <div id="exampleApp" class="example-content"></div>
  <section class="card empty-state" id="exampleEmpty" hidden>
    <h2>該当する例文がありません</h2>
    <p>検索語を短くするか、別のDayを選んでみてください。</p>
  </section>

  <noscript>
    <section class="card empty-state">
      <h2>例文の表示にはJavaScriptが必要です</h2>
      <p>ブラウザーのJavaScriptを有効にして、ページを再読み込みしてください。</p>
    </section>
  </noscript>
</main>

<footer>TOCFL Band B 学習サポート・例文集</footer>
<script src="../assets/js/example-data.js?v=20260720-2"></script>
<script>
(function(){
  const data = Array.isArray(window.TOCFL_EXAMPLES) ? window.TOCFL_EXAMPLES : [];
  const app = document.getElementById('exampleApp');
  const empty = document.getElementById('exampleEmpty');
  const dayFilter = document.getElementById('dayFilter');
  const searchInput = document.getElementById('exampleSearch');
  const resultCount = document.getElementById('resultCount');
  const translationToggle = document.getElementById('translationToggle');
  const sizeButtons = [...document.querySelectorAll('[data-size]')];

  const escapeHtml = value => String(value)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');

  const searchableText = item => [
    item.word,
    item.pinyin,
    item.meaning,
    item.note,
    ...item.examples.flatMap(example => [example.chinese, example.pinyin, example.japanese])
  ].join(' ').toLocaleLowerCase();

  const sentenceText = sentence => [sentence.chinese, sentence.pinyin, sentence.japanese]
    .join(' ')
    .toLocaleLowerCase();

  const lessonHref = day => day <= 3
    ? `../lessons/day${day}.html`
    : `../lessons/course.html?day=${day}`;

  const sentenceMarkup = (sentence, index) => `
    <li class="example-sentence">
      <span class="sentence-number">例文 ${index + 1}</span>
      <p class="chinese-sentence" lang="zh-Hant">${escapeHtml(sentence.chinese)}</p>
      <p class="sentence-pinyin" lang="zh-Latn">${escapeHtml(sentence.pinyin)}</p>
      <p class="sentence-japanese example-japanese">${escapeHtml(sentence.japanese)}</p>
    </li>`;

  const wordMarkup = item => `
    <article class="card word-example-card">
      <div class="example-word-heading">
        <div>
          <h3 class="example-word" lang="zh-Hant">${escapeHtml(item.word)}</h3>
          <p class="example-word-pinyin" lang="zh-Latn">${escapeHtml(item.pinyin)}</p>
        </div>
        <p class="example-meaning example-japanese">${escapeHtml(item.meaning)}</p>
      </div>
      <div class="usage-note">
        <strong>使い方メモ</strong>
        <p>${escapeHtml(item.note)}</p>
      </div>
      <ol class="sentence-list">
        ${item.examples.map(sentenceMarkup).join('')}
      </ol>
    </article>`;

  const summaryMarkup = sentences => `
    <section class="card summary-example-card">
      <span class="eyebrow">DAY REVIEW</span>
      <h3>まとめ例文</h3>
      <p class="muted">この日の単語を組み合わせて、まとまった文でも確認します。</p>
      <ol class="sentence-list summary-sentence-list">
        ${sentences.map(sentenceMarkup).join('')}
      </ol>
    </section>`;

  function buildDayOptions(){
    dayFilter.innerHTML = [
      '<option value="all">すべてのDay</option>',
      ...data.map(day => `<option value="${day.day}">Day ${day.day}・${escapeHtml(day.theme)}</option>`)
    ].join('');

    const requestedDay = Number(new URLSearchParams(location.search).get('day'));
    if(data.some(item => item.day === requestedDay)) dayFilter.value = String(requestedDay);
  }

  function render(){
    const selectedDay = dayFilter.value;
    const query = searchInput.value.trim().toLocaleLowerCase();
    let wordCount = 0;
    let summaryCount = 0;

    const sections = data
      .filter(day => selectedDay === 'all' || String(day.day) === selectedDay)
      .map(day => {
        const words = day.words.filter(word => !query || searchableText(word).includes(query));
        const summaries = day.summaryExamples.filter(sentence => !query || sentenceText(sentence).includes(query));
        wordCount += words.length;
        summaryCount += summaries.length;
        if(!words.length && !summaries.length) return '';

        return `
          <section class="example-day-section" aria-labelledby="day${day.day}Heading">
            <div class="example-day-heading">
              <div>
                <span class="eyebrow">DAY ${day.day}</span>
                <h2 id="day${day.day}Heading">${escapeHtml(day.theme)}</h2>
              </div>
              <a class="text-link" href="${lessonHref(day.day)}">レッスンへ戻る →</a>
            </div>
            <div class="example-word-list">${words.map(wordMarkup).join('')}</div>
            ${summaries.length ? summaryMarkup(summaries) : ''}
          </section>`;
      })
      .join('');

    app.innerHTML = sections;
    empty.hidden = Boolean(wordCount || summaryCount);
    resultCount.textContent = `${wordCount}語・まとめ${summaryCount}件`;

    const url = new URL(location.href);
    if(selectedDay === 'all') url.searchParams.delete('day');
    else url.searchParams.set('day', selectedDay);
    history.replaceState(null, '', url);
  }

  function setTranslationVisibility(visible){
    document.body.dataset.translation = visible ? 'visible' : 'hidden';
    translationToggle.setAttribute('aria-pressed', String(visible));
    translationToggle.textContent = visible ? '日本語訳を隠す' : '日本語訳を表示';
    try{ localStorage.setItem('tocfl_examples_translation', visible ? 'visible' : 'hidden'); }catch(error){}
  }

  function setExampleSize(size){
    const allowed = ['normal', 'large', 'xlarge'];
    const selected = allowed.includes(size) ? size : 'normal';
    document.body.dataset.exampleSize = selected;
    sizeButtons.forEach(button => {
      const active = button.dataset.size === selected;
      button.classList.toggle('active', active);
      button.setAttribute('aria-pressed', String(active));
    });
    try{ localStorage.setItem('tocfl_examples_size', selected); }catch(error){}
  }

  dayFilter.addEventListener('change', render);
  searchInput.addEventListener('input', render);
  translationToggle.addEventListener('click', () => {
    setTranslationVisibility(document.body.dataset.translation !== 'visible');
  });
  sizeButtons.forEach(button => button.addEventListener('click', () => setExampleSize(button.dataset.size)));

  buildDayOptions();
  try{
    setTranslationVisibility(localStorage.getItem('tocfl_examples_translation') !== 'hidden');
    setExampleSize(localStorage.getItem('tocfl_examples_size') || 'normal');
  }catch(error){
    setTranslationVisibility(true);
    setExampleSize('normal');
  }
  render();
})();
</script>
</body>
</html>
